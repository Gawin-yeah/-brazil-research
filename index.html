<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Research Survey</title>
  <style>
    :root {
      --primary-color: #000000;
      --accent-color: #3b82f6;
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    /* Language Switcher */
    .header-controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }
    #languagePicker {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: white;
      font-size: 14px;
      cursor: pointer;
    }

    h1 { font-size: 28px; margin-bottom: 12px; letter-spacing: -0.5px; }
    .intro { color: var(--text-muted); margin-bottom: 30px; font-size: 16px; }
    
    h2 { 
      margin-top: 40px; 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      color: var(--accent-color);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .question { margin: 28px 0; }
    label.q { display: block; font-weight: 600; margin-bottom: 8px; font-size: 16px; }
    
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      ring: 2px rgba(59, 130, 246, 0.2);
    }

    .option {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      margin: 8px 0;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .option:hover { background: #f3f4f6; }
    .option input { margin-right: 12px; width: 18px; height: 18px; }

    button[type="submit"] {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 30px;
      transition: transform 0.1s, opacity 0.2s;
    }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-note {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 40px;
    }

    /* Mobile optimization */
    @media (max-width: 600px) {
      .card { padding: 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-controls">
    <select id="languagePicker" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="pt">Português (Brasil)</option>
      <option value="zh">中文</option>
    </select>
  </div>

  <div class="card">
    <h1 id="title">Brazil Female User Research Survey</h1>
    <p class="intro" id="intro-text">
      Share your thoughts on photo editing, AI beauty, and K-pop trends. This takes about 3-5 minutes.
    </p>

    <!-- Formspree Integration -->
    <form id="surveyForm" action="https://formspree.io/f/xzdqzkvy" method="POST">
      
      <h2 id="sec-1">1. Basic Information</h2>
      
      <div class="question">
        <label class="q" id="q1">1. Age</label>
        <select name="Age" required>
          <option value="" id="opt-select">Select one</option>
          <option>Under 18</option>
          <option>18–20</option>
          <option>21–24</option>
          <option>25–29</option>
          <option>30–34</option>
          <option>35+</option>
        </select>
      </div>

      <div class="question">
        <label class="q" id="q2">2. City and State in Brazil</label>
        <input type="text" name="Location" id="input-loc" placeholder="e.g. São Paulo, SP" required>
      </div>

      <div class="question">
        <label class="q" id="q-phone">3. Your Phone Model</label>
        <input type="text" name="PhoneModel" id="input-phone" placeholder="e.g. iPhone 14 / Samsung S23">
      </div>

      <h2 id="sec-2">2. Editing & AI</h2>

      <div class="question">
        <label class="q" id="q3">4. Which apps do you use to edit?</label>
        <div id="app-options">
          <label class="option"><input type="checkbox" name="Apps" value="Instagram"> Instagram</label>
          <label class="option"><input type="checkbox" name="Apps" value="TikTok"> TikTok</label>
          <label class="option"><input type="checkbox" name="Apps" value="CapCut"> CapCut</label>
          <label class="option"><input type="checkbox" name="Apps" value="Picsart"> Picsart</label>
          <label class="option"><input type="checkbox" name="Apps" value="Facetune"> Facetune</label>
        </div>
      </div>

      <div class="question">
        <label class="q" id="q4">5. Interest in AI Tattoo Preview?</label>
        <select name="AI_Tattoo_Interest">
          <option value="Very Interested" id="opt-very">Very Interested</option>
          <option value="Somewhat" id="opt-some">Somewhat</option>
          <option value="Not Interested" id="opt-none">Not Interested</option>
        </select>
      </div>

      <h2 id="sec-3">3. Cultural Trends</h2>

      <div class="question">
        <label class="q" id="q5">6. How popular is K-pop in your circle?</label>
        <select name="Kpop_Popularity">
          <option value="High" id="opt-high">Extremely popular</option>
          <option value="Medium" id="opt-med">Fairly popular</option>
          <option value="Low" id="opt-low">Not very popular</option>
        </select>
      </div>

      <div class="question">
        <label class="q" id="q6">7. Any other trends we should know about?</label>
        <textarea name="Trends" id="placeholder-trends" placeholder="Write here..."></textarea>
      </div>

      <button type="submit" id="btn-submit">Submit Responses</button>
    </form>
    
    <p class="footer-note" id="footer">Your privacy is respected. Data used for research only.</p>
  </div>
</div>

<script>
const translations = {
  en: {
    title: "Brazil Female User Research Survey",
    intro: "Share your thoughts on photo editing, AI beauty, and K-pop trends. This takes about 3-5 minutes.",
    sec1: "1. Basic Information",
    sec2: "2. Editing & AI",
    sec3: "3. Cultural Trends",
    q1: "1. Age",
    q2: "2. City and State in Brazil",
    q_phone: "3. Your Phone Model",
    q3: "4. Which apps do you use to edit?",
    q4: "5. Interest in AI Tattoo Preview?",
    q5: "6. How popular is K-pop in your circle?",
    q6: "7. Any other trends we should know about?",
    btn: "Submit Responses",
    btn_loading: "Sending...",
    select: "Select one",
    very: "Very Interested",
    some: "Somewhat",
    none: "Not Interested",
    high: "Extremely popular",
    med: "Fairly popular",
    low: "Not very popular",
    footer: "Your privacy is respected. Data used for research only.",
    ph_loc: "e.g. São Paulo, SP",
    ph_phone: "e.g. iPhone 14 / Samsung S23",
    ph_trends: "Write here..."
  },
  pt: {
    title: "Pesquisa com Usuárias Brasileiras",
    intro: "Compartilhe suas opiniões sobre edição de fotos, beleza com IA e tendências de K-pop. Leva de 3 a 5 minutos.",
    sec1: "1. Informações Básicas",
    sec2: "2. Edição e IA",
    sec3: "3. Tendências Culturais",
    q1: "1. Idade",
    q2: "2. Cidade e Estado",
    q_phone: "3. Modelo do seu Celular",
    q3: "4. Quais apps você usa para editar?",
    q4: "5. Interesse em Pré-visualização de Tatuagem com IA?",
    q5: "6. Quão popular é o K-pop no seu círculo?",
    q6: "7. Alguma outra tendência que devemos saber?",
    btn: "Enviar Respostas",
    btn_loading: "Enviando...",
    select: "Selecione uma opção",
    very: "Muito Interessada",
    some: "Um pouco",
    none: "Não tenho interesse",
    high: "Extremamente popular",
    med: "Razoavelmente popular",
    low: "Não muito popular",
    footer: "Sua privacidade é respeitada. Dados usados apenas para pesquisa.",
    ph_loc: "Ex: São Paulo, SP",
    ph_phone: "Ex: iPhone 14 / Samsung S23",
    ph_trends: "Escreva aqui..."
  },
  zh: {
    title: "巴西女性用户调研问卷",
    intro: "分享您对照片编辑、AI 美颜和 K-pop 趋势的看法。大约需要 3-5 分钟。",
    sec1: "1. 基础信息",
    sec2: "2. 编辑与 AI 习惯",
    sec3: "3. 文化趋势",
    q1: "1. 年龄",
    q2: "2. 所在的巴西城市与州",
    q_phone: "3. 您的手机型号",
    q3: "4. 您使用哪些 App 进行编辑？",
    q4: "5. 对 AI 纹身预览功能感兴趣吗？",
    q5: "6. K-pop 在您的社交圈流行吗？",
    q6: "7. 还有其他值得关注的趋势吗？",
    btn: "提交回答",
    btn_loading: "提交中...",
    select: "请选择",
    very: "非常感兴趣",
    some: "一般般",
    none: "不感兴趣",
    high: "非常流行",
    med: "比较流行",
    low: "不太流行",
    footer: "我们尊重您的隐私，数据仅用于调研。",
    ph_loc: "例如：圣保罗, SP",
    ph_phone: "例如：iPhone 14 / 三星 S23",
    ph_trends: "在此填写..."
  }
};

function changeLanguage() {
  const lang = document.getElementById('languagePicker').value;
  const t = translations[lang];
  
  // 更新文本内容
  document.getElementById('title').textContent = t.title;
  document.getElementById('intro-text').textContent = t.intro;
  document.getElementById('sec-1').textContent = t.sec1;
  document.getElementById('sec-2').textContent = t.sec2;
  document.getElementById('sec-3').textContent = t.sec3;
  document.getElementById('q1').textContent = t.q1;
  document.getElementById('q2').textContent = t.q2;
  document.getElementById('q-phone').textContent = t.q_phone;
  document.getElementById('q3').textContent = t.q3;
  document.getElementById('q4').textContent = t.q4;
  document.getElementById('q5').textContent = t.q5;
  document.getElementById('q6').textContent = t.q6;
  document.getElementById('btn-submit').textContent = t.btn;
  document.getElementById('footer').textContent = t.footer;
  
  // 更新选项
  document.getElementById('opt-select').textContent = t.select;
  document.getElementById('opt-very').textContent = t.very;
  document.getElementById('opt-some').textContent = t.some;
  document.getElementById('opt-none').textContent = t.none;
  document.getElementById('opt-high').textContent = t.high;
  document.getElementById('opt-med').textContent = t.med;
  document.getElementById('opt-low').textContent = t.low;

  // 更新占位符
  document.getElementById('input-loc').placeholder = t.ph_loc;
  document.getElementById('input-phone').placeholder = t.ph_phone;
  document.getElementById('placeholder-trends').placeholder = t.ph_trends;
  
  // 保存语言偏好
  localStorage.setItem('preferredLang', lang);
}

// --- 记忆功能：自动保存与加载数据 ---

const form = document.getElementById('surveyForm');

// 保存数据到本地
form.addEventListener('input', () => {
  const formData = new FormData(form);
  const data = {};
  formData.forEach((value, key) => {
    if (!data[key]) { data[key] = value; return; }
    if (!Array.isArray(data[key])) { data[key] = [data[key]]; }
    data[key].push(value);
  });
  localStorage.setItem('surveyProgress', JSON.stringify(data));
});

// 页面加载时恢复数据
window.addEventListener('DOMContentLoaded', () => {
  // 恢复语言
  const savedLang = localStorage.getItem('preferredLang');
  if (savedLang) {
    document.getElementById('languagePicker').value = savedLang;
    changeLanguage();
  }

  // 恢复表单内容
  const savedData = JSON.parse(localStorage.getItem('surveyProgress'));
  if (savedData) {
    Object.keys(savedData).forEach(key => {
      const element = form.elements[key];
      if (!element) return;
      if (element.type === 'checkbox') {
        const values = Array.isArray(savedData[key]) ? savedData[key] : [savedData[key]];
        // 处理多选框
        const checkboxes = document.getElementsByName(key);
        checkboxes.forEach(cb => {
          if (values.includes(cb.value)) cb.checked = true;
        });
      } else {
        element.value = savedData[key];
      }
    });
  }
});

// 提交时清空缓存并显示加载状态
form.addEventListener('submit', () => {
  const btn = document.getElementById('btn-submit');
  const lang = document.getElementById('languagePicker').value;
  btn.textContent = translations[lang].btn_loading;
  btn.disabled = true;
  localStorage.removeItem('surveyProgress'); 
});

</script>
</body>
</html>
